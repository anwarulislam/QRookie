name: MacOS Bundle (arm64)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version for DMG (e.g. 1.2.3)"
        required: false
        default: "dev"

  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Homebrew
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="${{ inputs.version }}"
          fi

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build App
        run: |
          cd macOs/
          ./signApp.sh

      - name: Rename DMG
        run: |
          cd macOs
          mv *.dmg "QRookie_${{ steps.version.outputs.VERSION }}_arm64.dmg"

      - name: Upload artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: dmg
          path: macOs/QRookie_*_arm64.dmg

      - name: Upload to GitHub Release (only on tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.TOKEN }}
          file: macOs/QRookie_${{ steps.version.outputs.VERSION }}_arm64.dmg
          asset_name: QRookie_${{ steps.version.outputs.VERSION }}_arm64.dmg
          tag: ${{ github.ref_name }}
